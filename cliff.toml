#
# git-cliff configuration for VoiceTypeX — generates CHANGELOG.md and the
# GitHub release body from Conventional Commits.
#
# Generate:
#   git cliff --latest --strip header -o release_notes.md   # only the current tag (CI release body)
#   git cliff -o CHANGELOG.md                                # full changelog
#   git cliff --unreleased                                   # preview of the still-untagged commits
#
# IMPORTANT: When a NEW commit type is introduced, add it here in
# `commit_parsers` — otherwise it falls into the catch-all and
# disappears from the changelog (this applies in particular to the project's own
# `tune:`, which is listed here explicitly as its own group).

[changelog]
header = """
# Changelog

All notable changes to VoiceTypeX. Format based on
[Keep a Changelog](https://keepachangelog.com/), versioning per
[Semantic Versioning](https://semver.org/).
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
# Only consider Conventional Commits; filter out everything else.
conventional_commits = true
filter_unconventional = true
split_commits = false
# Group order is controlled via the hidden `<!-- N -->` prefix
# (group_by sorts lexicographically), which `striptags` in the template
# removes again for display.
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->🚀 Features" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^perf", group = "<!-- 2 -->⚡ Performance" },
    { message = "^tune", group = "<!-- 3 -->🎚️ Tuning" },
    { message = "^refactor", group = "<!-- 4 -->♻️ Refactor" },
    { message = "^docs", group = "<!-- 5 -->📝 Documentation" },
    { message = "^diag", group = "<!-- 6 -->🔍 Diagnostics" },
    { message = "^chore\\(deps\\)", group = "<!-- 7 -->📦 Dependencies" },
    # Noise types do not appear in the user changelog.
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", skip = true },
    { message = "^test", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
    # Catch-all: explicitly discard everything not yet captured, so that no
    # group-less entries end up in the changelog. Add new types ABOVE
    # beforehand.
    { message = ".*", skip = true },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"
