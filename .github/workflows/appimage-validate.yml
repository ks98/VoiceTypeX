# SPDX-License-Identifier: GPL-3.0-or-later
#
# TEMPORARY validation workflow for ks98/VoiceTypeX#2.
#
# Builds ONLY the Linux AppImage (with NO_STRIP=true + --verbose) on
# ubuntu-24.04 and uploads it as an artifact — WITHOUT creating a release.
# Purpose:
#   1. confirm that NO_STRIP fixes the linuxdeploy strip problem (.relr.dyn,
#      "unknown type [0x13]") and that the AppImage build completes;
#   2. provide the built AppImage for the local startup/white-screen smoke test
#      before the in-app updater (includeUpdaterJson) is re-enabled.
#
# Runs automatically on push to the fix branch (see push trigger) and is
# additionally manually triggerable once the file is on main. Remove again
# after successful validation + updater reactivation.

name: AppImage Validate (issue #2)

on:
  # workflow_dispatch only takes effect once the file is on the default branch
  # (GitHub limitation: HTTP 404 otherwise). So that validation already runs
  # on this feature branch, an additional branch-scoped push trigger. Remove
  # both after the merge/the validation.
  workflow_dispatch:
  push:
    branches: [fix/appimage-ci-bundling]

permissions:
  contents: read

jobs:
  appimage:
    name: Build AppImage (validation, no release)
    runs-on: ubuntu-24.04
    env:
      # linuxdeploy's bundled strip (binutils 2.35) breaks on the
      # .relr.dyn sections of modern system libs -> skip the strip pass.
      NO_STRIP: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Identical system deps as in the release build (Tauri + Vulkan GPU build).
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev glslc spirv-headers cmake clang \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libasound2-dev libxdo-dev libudev-dev \
            libxcb1-dev libxcb-xtest0-dev libxcb-xfixes0-dev \
            libdbus-1-dev libclang-dev patchelf

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.15.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"

      # tauri build runs beforeBuildCommand (pnpm build, incl. i18n gate)
      # and beforeBundleCommand (bundle-libs.mjs) itself. --verbose makes
      # linuxdeploy's otherwise swallowed stderr visible. createUpdaterArtifacts
      # (tauri.conf.json) signs the AppImage -> signing key needed so the
      # build does not abort; at the same time validates the .sig updater artifacts.
      - name: Build AppImage (NO_STRIP, verbose)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # linuxdeploy resolves the binary's NEEDED libs and does NOT find
          # libllama.so.0/libggml*.so — they live as a Tauri resource in
          # resources/lib, not on a standard linker path. Add the path so
          # linuxdeploy finds them + deploys them to usr/lib. bundle-libs.mjs
          # fills the directory in the beforeBundleCommand (before bundling).
          LD_LIBRARY_PATH: ${{ github.workspace }}/src-tauri/resources/lib
        run: pnpm tauri build --bundles appimage --verbose

      - name: Upload AppImage + updater artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: voicetypex-appimage
          if-no-files-found: error
          path: src-tauri/target/release/bundle/appimage/
