# SPDX-License-Identifier: GPL-3.0-or-later
#
# Release pipeline. Triggered by a tag `v*` (created via
# `pnpm release <bump>` -> `git push --follow-tags`).
#
# Flow: git-cliff generates the release notes -> tauri-action builds the
# bundles (Linux: deb/rpm/AppImage, Windows: NSIS), signs the
# updater artifacts with the minisign key, creates a GitHub release as a
# DRAFT (review gate) and uploads assets + latest.json.
# Publishing is a deliberate manual click ("Publish release"
# or `gh release edit <tag> --draft=false`) — only then does
# /releases/latest/download/latest.json point to the new version and the
# in-app updater offers it.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # tauri-action: create release + upload assets (GITHUB_TOKEN)

jobs:
  changelog:
    name: Release-Notes (git-cliff)
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # git-cliff needs full history + tags
      - name: Generate release notes
        id: git-cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header

  release:
    name: Build + Release (${{ matrix.platform }})
    needs: changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: ubuntu-24.04, because glslc is a clean apt package there.
          # Sets a glibc-2.39 lower bound (matches the
          # README support Plasma 6 / GNOME 46+). Produces deb/rpm/AppImage.
          - platform: ubuntu-24.04
            # AppImage active again. The earlier CI failure was NOT FUSE,
            # but linuxdeploy's bundled strip (binutils 2.35), which dies on
            # the .relr.dyn sections of modern system libs (glibc >=2.36)
            # ("unknown type [0x13]"). NO_STRIP=true (build step below)
            # skips the strip pass; --verbose surfaces the stderr that
            # linuxdeploy otherwise swallows. (ks98/VoiceTypeX#2, tauri#14796)
            args: "--bundles deb,rpm,appimage --verbose"
          # Windows: STT (whisper.cpp + Vulkan) + cloud/Ollama LLM. The
          # embedded llama-cpp-2 is stripped out on Windows (ks98/VoiceTypeX#1),
          # which removes the ggml-LNK2005 collision and lets the MSVC link
          # succeed. tauri-action builds the NSIS bundle (updaterJsonPreferNsis);
          # empty args = default bundles of the Windows host (nsis).
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # MSVC + Ninja for the Windows Vulkan build: the vulkan-shaders-gen
      # ExternalProject of ggml/llama.cpp does not build with the VS generator.
      # Windows only — on Linux the default generator stays.
      - name: Set up MSVC environment (Windows)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      - name: Windows build environment (Ninja, long paths, short target dir)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Ninja instead of VS generator (vulkan-shaders-gen ExternalProject);
          # long paths + short target dir against MSVC MAX_PATH (260) in the
          # nested shader build (C1083, empty filename).
          echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV
          echo "CARGO_TARGET_DIR=C:\t" >> $env:GITHUB_ENV
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
      - name: Disable ccache (breaks the ggml-vulkan nested MSVC build)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # ggml enables ccache automatically when found; ccache + MSVC
          # /Zi breaks the nested vulkan-shaders-gen build (C1083).
          # Hide ccache + sccache -> GGML_CCACHE off.
          foreach ($tool in 'ccache', 'sccache') {
            Get-Command $tool -All -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "Disabling $($_.Source)"
              Rename-Item -Path $_.Source -NewName "$($_.Name).disabled" -ErrorAction SilentlyContinue
            }
          }

      # --- System dependencies (Tauri + Vulkan GPU build) ----------------
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev glslc spirv-headers cmake clang \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libasound2-dev libxdo-dev libudev-dev \
            libxcb1-dev libxcb-xtest0-dev libxcb-xfixes0-dev \
            libdbus-1-dev libclang-dev patchelf
      # No FUSE2 step needed: the tauri-bundler invokes linuxdeploy anyway
      # with --appimage-extract-and-run + APPIMAGE_EXTRACT_AND_RUN=1,
      # so it mounts nothing. The libfuse2t64 previously installed here was
      # a no-op (the real AppImage fix is NO_STRIP, see build step).

      # glslc + Vulkan headers for whisper.cpp/llama.cpp. PIN the version —
      # an unpinned "latest" has shaderc-2025.x regressions that break the
      # ggml-Vulkan shader build. Validate on the first CI run against
      # whisper-rs 0.16 / llama-cpp-2 0.1.146, then bump if needed.
      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest'
        uses: jakoch/install-vulkan-sdk-action@b394a1abed9cb019d8e637eeadac93d73e0853da # v1.5.5
        with:
          vulkan_version: 1.3.296.0
          install_runtime: false
          cache: true
          stripdown: false

      # --- Toolchains ----------------------------------------------------
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.15.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"
          # whisper-rs-sys has no rerun-if-env-changed for GGML_*, so an
          # env-only ISA change would NOT rebuild a cached native whisper.
          # Bump this key whenever the GGML_* baseline above changes.
          prefix-key: "v1-ggml-x86-64-v3"

      # --- Build + Release ----------------------------------------------
      # tauri-action calls `tauri build`, which runs the beforeBuildCommand
      # (pnpm build, incl. i18n:check) and beforeBundleCommand (bundle-libs.mjs,
      # copies the GPU libs to resources/lib) itself — NO separate
      # build steps needed. Default features (gpu-vulkan); no
      # --all-features (that would pull in embedded-cuda-dynamic, needs CUDA).
      - name: Build bundles + create release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # linuxdeploy's bundled strip (binutils 2.35) breaks on the
          # .relr.dyn sections of modern system libs -> skip the strip
          # pass. Read by linuxdeploy (NOT by Tauri) and
          # CANNOT live in tauri.conf.json. -> ks98/VoiceTypeX#2
          NO_STRIP: "true"
          # linuxdeploy does not find the NEEDED libs libllama.so.0/libggml*.so
          # (Tauri resource resources/lib, not a standard linker path) -> add
          # the path so it resolves them + deploys them to usr/lib.
          # -> ks98/VoiceTypeX#2
          LD_LIBRARY_PATH: ${{ github.workspace }}/src-tauri/resources/lib
          # whisper-rs-sys defaults to GGML_NATIVE=ON (-march=native): on the
          # AVX-512-capable CI runner that bakes AVX-512 into whisper's static
          # ggml -> SIGILL ("illegal instruction") on consumer CPUs without
          # AVX-512 (Intel Meteor Lake / any Alder Lake+ consumer part). Pin a
          # portable x86-64-v3 baseline instead. These GGML_* vars are
          # forwarded ONLY by whisper-rs-sys; llama-cpp-sys-2 ignores them (it
          # forwards CMAKE_* only and sets GGML_NATIVE itself). Quote the
          # values so YAML does not coerce ON/OFF to booleans.
          GGML_NATIVE: "OFF"
          GGML_AVX: "ON"
          GGML_AVX2: "ON"
          GGML_FMA: "ON"
          GGML_F16C: "ON"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VoiceTypeX ${{ github.ref_name }}"
          releaseBody: ${{ needs.changelog.outputs.body }}
          # Draft = review gate: assets + latest.json upload, but only
          # become visible to the updater on the manual publish.
          releaseDraft: true
          # Mark -rc/-beta tags as prerelease -> /releases/latest/
          # skips them, stable users are not offered them.
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          # We build NSIS (not WiX) on Windows -> NSIS in latest.json.
          # Do NOT upload latest.json yet: the AppImage build was just
          # (via NO_STRIP) fixed and is not yet validated for
          # runnability (white-screen risk). Arm it once the
          # appimage-validate workflow confirms a launching AppImage.
          # (deb/rpm could also self-update with tauri-plugin-updater 2.10.1
          # — separate path.) -> ks98/VoiceTypeX#2
          # Input name is `includeUpdaterJson` on tauri-action@v0; a prior
          # `uploadUpdaterJson` was silently ignored (an unknown input ->
          # latest.json got uploaded regardless of the intended guard). The
          # dev branch renamed it back to `uploadUpdaterJson`, so pin the
          # action version if you ever bump @v0.
          includeUpdaterJson: false
          args: ${{ matrix.args }}
