# SPDX-License-Identifier: GPL-3.0-or-later
#
# Lightweight checks on every push to main and every Pull Request:
# Lint, Test, Build-Check and Supply-Chain-Audit. The heavy
# Bundle-Build runs ONLY on Tags (see release.yml).

name: CI

on:
  push:
    branches: [main]
    # Doc-only changes do not trigger the heavy native build.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "COPYING"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "COPYING"

# Cancel in-flight PR checks when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-linux:
    name: Lint + Test (Linux)
    runs-on: ubuntu-24.04
    # Portable CPU baseline for whisper's static ggml (see release.yml /
    # docs/PLATFORMS.md): without this, GGML_NATIVE=ON bakes AVX-512 into
    # whisper -> SIGILL on consumer CPUs without AVX-512. whisper-only
    # (llama-cpp-sys-2 ignores GGML_*). Quote so YAML keeps ON/OFF as strings.
    env:
      GGML_NATIVE: "OFF"
      GGML_AVX: "ON"
      GGML_AVX2: "ON"
      GGML_FMA: "ON"
      GGML_F16C: "ON"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev glslc spirv-headers cmake clang \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libasound2-dev libxdo-dev libudev-dev \
            libxcb1-dev libxcb-xtest0-dev libxcb-xfixes0-dev \
            libdbus-1-dev libclang-dev patchelf
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.15.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # generate_context!() embeds frontendDist (../dist) -> dist must
      # exist before cargo clippy/test. pnpm build produces it (and runs
      # the i18n:check-prebuild gate).
      - name: Build frontend (dist for generate_context!)
        run: pnpm build
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"
          # Bumped so the GGML_* ISA baseline change actually rebuilds whisper
          # (whisper-rs-sys has no rerun-if-env-changed for GGML_*).
          prefix-key: "v1-ggml-x86-64-v3"
      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: eslint
        run: pnpm lint
      - name: prettier
        run: pnpm format:check
      # clippy produced the ggml/llama build above; before the SECOND build
      # (cargo test) clean up the dangling libggml*/libllama links, otherwise
      # llama-cpp-sys-2 0.1.146 panics (Os code 17, AlreadyExists) — the same
      # TOC/TOU bug that scripts/clean-dangling-libs.mjs addresses.
      - name: Clean dangling GPU libs before the second build
        run: node scripts/clean-dangling-libs.mjs
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib
      - name: vitest
        run: pnpm test

  build-windows:
    name: Build + Test (Windows)
    runs-on: windows-latest
    # Ninja instead of VS generator: the vulkan-shaders-gen-ExternalProject of
    # ggml/llama.cpp does not build with the VS generator (nested
    # compiler detection fails). msvc-dev-cmd puts cl.exe + ninja
    # on the PATH.
    env:
      CMAKE_GENERATOR: Ninja
      # Short target dir to avoid MSVC MAX_PATH (260): otherwise the nested
      # vulkan-shaders-gen build produces paths > 260 characters (C1083).
      CARGO_TARGET_DIR: C:\t
      # Portable CPU baseline for whisper's static ggml (see release.yml /
      # docs/PLATFORMS.md): avoid AVX-512 SIGILL on non-AVX-512 CPUs.
      # whisper-only; ggml's CMake maps these to MSVC /arch:AVX2 etc.
      GGML_NATIVE: "OFF"
      GGML_AVX: "ON"
      GGML_AVX2: "ON"
      GGML_FMA: "ON"
      GGML_F16C: "ON"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      - name: Enable Windows long paths
        shell: pwsh
        run: New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
      - name: Disable ccache (breaks the ggml-vulkan nested MSVC build)
        shell: pwsh
        run: |
          # ggml enables ccache automatically when found; ccache + MSVC
          # /Zi breaks the nested vulkan-shaders-gen build (C1083,
          # empty file name). Hide ccache + sccache -> GGML_CCACHE off.
          foreach ($tool in 'ccache', 'sccache') {
            Get-Command $tool -All -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "Disabling $($_.Source)"
              Rename-Item -Path $_.Source -NewName "$($_.Name).disabled" -ErrorAction SilentlyContinue
            }
          }
      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@b394a1abed9cb019d8e637eeadac93d73e0853da # v1.5.5
        with:
          vulkan_version: 1.3.296.0
          install_runtime: false
          cache: true
          stripdown: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.15.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"
          # Bumped so the GGML_* ISA baseline change actually rebuilds whisper
          # (whisper-rs-sys has no rerun-if-env-changed for GGML_*).
          prefix-key: "v1-ggml-x86-64-v3"
      - name: pnpm build (frontend + i18n gate)
        run: pnpm build
      # Windows links now: the embedded llama-cpp-2 is removed on Windows
      # (ks98/VoiceTypeX#1), leaving only whisper's static ggml
      # and eliminating the ggml symbol collision (LNK2005). cargo build
      # runs the full link (which cargo check previously masked),
      # cargo test --lib mirrors the Linux job.
      - name: cargo build
        run: cargo build --manifest-path src-tauri/Cargo.toml
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  audit:
    name: Supply-Chain-Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: cargo-audit
        run: |
          cargo install --locked cargo-audit
          # --deny warnings also turns yanked crates and informational
          # advisories into errors. The --ignore list suppresses known
          # transitive unmaintained/unsound advisories from the Tauri/GTK3
          # stack that we cannot fix ourselves (no maintained upstream we
          # can pull). The dependency chain is tauri -> tray-icon ->
          # libappindicator -> gtk 0.18 (gtk3-rs) and tauri-utils ->
          # urlpattern -> unic-*; both are deprecated upstream. Revisit the
          # whole list when Tauri drops GTK3 / gtk-rs ships maintained GTK4
          # bindings (and urlpattern moves off unic). Per-entry rationale +
          # review date below; keep this list identical to the [advisories]
          # ignore in src-tauri/deny.toml.
          #
          # gtk3-rs stack (unmaintained, no fix; gtk-rs deprecated the GTK3
          # bindings, pulled via gtk 0.18 -> libappindicator -> tray-icon ->
          # tauri); review 2026-09:
          #   RUSTSEC-2024-0411: gdkwayland-sys 0.18 unmaintained
          #   RUSTSEC-2024-0412: gdk 0.18 unmaintained
          #   RUSTSEC-2024-0413: atk 0.18 unmaintained
          #   RUSTSEC-2024-0414: gdkx11-sys 0.18 unmaintained
          #   RUSTSEC-2024-0415: gtk 0.18 unmaintained
          #   RUSTSEC-2024-0416: atk-sys 0.18 unmaintained
          #   RUSTSEC-2024-0417: gdkx11 0.18 unmaintained
          #   RUSTSEC-2024-0418: gdk-sys 0.18 unmaintained
          #   RUSTSEC-2024-0419: gtk3-macros 0.18 unmaintained
          #   RUSTSEC-2024-0420: gtk-sys 0.18 unmaintained
          # glib 0.18 stack (pulled by the gtk3-rs crates above); review
          # 2026-09:
          #   RUSTSEC-2024-0370: proc-macro-error 1.0.4 unmaintained
          #     (transitive via glib-macros 0.18 + gtk3-macros 0.18)
          #   RUSTSEC-2024-0429: glib 0.18 unsound (VariantStrIter,
          #     patched >=0.20; gtk3-rs pins glib 0.18, cannot bump
          #     without leaving GTK3)
          # unic-* stack (unmaintained, RUSTSEC issue #2414; transitive via
          #   urlpattern 0.3 -> tauri-utils); review 2026-09:
          #   RUSTSEC-2025-0075: unic-char-range 0.9 unmaintained
          #   RUSTSEC-2025-0080: unic-common 0.9 unmaintained
          #   RUSTSEC-2025-0081: unic-char-property 0.9 unmaintained
          #   RUSTSEC-2025-0098: unic-ucd-version 0.9 unmaintained
          #   RUSTSEC-2025-0100: unic-ucd-ident 0.9 unmaintained
          cargo audit --file src-tauri/Cargo.lock --deny warnings \
            --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2024-0411 \
            --ignore RUSTSEC-2024-0412 --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2024-0414 --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 --ignore RUSTSEC-2024-0417 \
            --ignore RUSTSEC-2024-0418 --ignore RUSTSEC-2024-0419 \
            --ignore RUSTSEC-2024-0420 --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2025-0075 --ignore RUSTSEC-2025-0080 \
            --ignore RUSTSEC-2025-0081 --ignore RUSTSEC-2025-0098 \
            --ignore RUSTSEC-2025-0100
      # cargo-deny gates licenses (GPL-3.0 compatibility, machine-enforced
      # — not just THIRD_PARTY_NOTICES.md), advisories and crate sources.
      # The advisory ignore list lives in src-tauri/deny.toml and mirrors
      # the cargo-audit --ignore list above; keep the two in sync.
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-deny
      - name: cargo-deny
        run: cargo deny --manifest-path src-tauri/Cargo.toml check
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.15.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit
        # moderate floor so moderate JS advisories are caught, not just
        # high/critical (ks98/VoiceTypeX#51).
        run: pnpm audit --audit-level=moderate
