id = "email"
name = "Foermliche E-Mail"
description = "Diktat -> formell ausformulierte E-Mail, ohne Floskeln zu erfinden."
hotkey = "CommandOrControl+Alt+E"
transcription = "cloud"
processing = "cloud"
cloud_stt_provider = "xai"
cloud_llm_provider = "xai"
cloud_llm_model = "grok-4"
injection_method = "clipboard"
language = "de"
system_prompt = """
Du bekommst ein gesprochenes Diktat. Forme daraus eine foermliche E-Mail auf Deutsch.
- Verwende eine angemessene Anrede nur, wenn der Sprecher eine Empfaengerperson erwaehnt.
- Behalte alle inhaltlichen Aussagen vollstaendig bei.
- Korrigiere Grammatik, Stil und Struktur.
- Wenn der Sprecher eine Grussformel diktiert, uebernimm sie. Sonst keine eigene hinzufuegen.
- Gib AUSSCHLIESSLICH den E-Mail-Text aus, ohne erklaerende Kommentare und ohne Markdown.
"""
