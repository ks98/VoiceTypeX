id = "korrektur"
name = "Korrigierendes Diktat"
description = "Versprecher und Grammatik raus, Inhalt bleibt 1:1. Lokal."
transcription = "local"
processing = "local"
# Ollama-Modell-Tag fuer den Legacy-Pfad (`local_engine = "ollama"`).
# Bleibt auf `gemma3:4b` fuer Backward-Compat — wer Ollama benutzt, hat
# das wahrscheinlich schon gepullt. Wenn du Ollama frisch installierst,
# `ollama pull gemma3:4b` (oder neuer: `ollama pull gemma4:4b` sobald
# bei Ollama verfuegbar).
#
# Fuer den **Embedded-Pfad** (`local_engine = "embedded"`) wird statt
# dessen `Settings.llm_default_slot` benutzt — Default-Empfehlung
# basiert auf Hardware-Probe:
#   12+ GB RAM → Gemma 4 E4B-IT Q5_K_M (April 2026, neuer Pro-Default)
#   8-12 GB   → Gemma 4 E2B-IT Q5_K_M
#   <8 GB     → Gemma 3 1B-IT Q5_K_M (Gemma 4 zu gross fuer Light)
ollama_model_tag = "gemma3:4b"
injection_method = "clipboard"
language = "de"

# "Faithful rewrite, do not extend" — Defaults aus Recherche Mai 2026.
# temperature 0.2: deterministisch genug fuer Konsistenz, lockert
#   gerade so, dass Versprecher abgedeckt werden.
# top_p 0.8: gedaempftes Nucleus-Sampling, vermeidet Stil-Drift.
# repeat_penalty 1.05: minimal — hoeher erzwingt unnatuerliche
#   Umformulierungen.
# max_tokens 1024: harter Cap gegen Loop-Verhalten bei langen
#   Diktaten — kleinere lokale Modelle (Gemma 1B/Llama 1B) neigen
#   sonst zur Wiederholung am Ende.
temperature = 0.2
top_p = 0.8
repeat_penalty = 1.05
max_tokens = 1024

system_prompt = """
Du bekommst eine wörtliche Transkription gesprochener Sprache (Diktat).

Aufgabe: Korrigiere Grammatik, Zeichensetzung und offensichtliche
Versprecher. Behalte Inhalt, Stil und Aussage exakt bei.

Wenn der Sprecher sich mitten im Satz selbst korrigiert ("ich meine",
"nein, halt"), übernimm die korrigierte Version und entferne die
verworfene.

Wenn das Diktat Wörter wie "Punkt", "Komma", "Absatz", "neue Zeile"
enthält, die offensichtlich Diktier-Befehle sind, setze stattdessen
das Satzzeichen bzw. den Zeilenumbruch.

Verbote:
- Keine Informationen hinzufügen, auch keine "natürlichen" Erweiterungen
  oder Anreden.
- Keine Inhalte weglassen oder zusammenfassen, selbst wenn sie redundant
  wirken.
- Kein Stilwechsel (z.B. Duzen → Siezen oder umgekehrt), außer um einen
  Versprecher zu beheben, der die Anrede zerschossen hat.

Gib ausschließlich den korrigierten Text aus — kein Vorwort, kein
Nachsatz, keine Erläuterung.

Beispiel 1 (Füllwörter):
Eingabe: ich wollte ähm heute pünktlich kommen aber dann hat die u-bahn glaube ich verspätung gehabt und ich wollte sagen das wir morgen vielleicht noch mal zusammen setzen können
Ausgabe: Ich wollte heute pünktlich kommen, aber die U-Bahn hatte glaube ich Verspätung. Ich wollte sagen, dass wir uns morgen vielleicht noch einmal zusammensetzen können.

Beispiel 2 (Selbstkorrektur):
Eingabe: wir treffen uns am dienstag äh nein am mittwoch um vierzehn uhr
Ausgabe: Wir treffen uns am Mittwoch um 14 Uhr.
"""
