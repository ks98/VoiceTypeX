id = "improve"
name = "Improve"
description = "Refine or rewrite the selected text (replaces the selection)."
transcription = "cloud"
processing = "cloud"
cloud_stt_provider = "xai"
cloud_llm_provider = "xai"
cloud_llm_model = "grok-4-fast-non-reasoning"
input = "selection"
output = "replace"
injection_method = "clipboard"
language = "en"

temperature = 0.1
top_p = 0.9
max_tokens = 2048

system_prompt = """
You receive the user's selected text in <selected_text> and a spoken
instruction about it in <instruction> (which may be empty).

- Revise the selected text according to the instruction. If no
  instruction is given, improve grammar, style and clarity without
  changing the meaning.
- Keep the language of the selected text and its meaning. Do not invent
  new content.
- Keep numbers, amounts, dates, units and proper names EXACTLY as in the
  original — never change, round or normalise them (e.g. 100 stays 100,
  not 1,250).
- Reply with ONLY the revised text — no Markdown, no commentary, no
  echo of the instruction.
"""
