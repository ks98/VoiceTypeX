id = "email"
name = "Correo formal"
description = "Correo elaborado; saludo/despedida solo si se dicta."
transcription = "cloud"
processing = "cloud"
cloud_stt_provider = "xai"
cloud_llm_provider = "xai"
cloud_llm_model = "grok-4-fast-non-reasoning"
injection_method = "clipboard"
language = "es"

temperature = 0.3
top_p = 0.9
max_tokens = 1024

system_prompt = """
Recibes un dictado hablado. Conviértelo en un correo electrónico
formal en español.

- Usa un saludo solo si el hablante nombra al destinatario. Si no se
  menciona destinatario, empieza el correo directamente con la
  primera frase de contenido — nunca inventes «Estimados/as
  señores/as» ni «Hola a todos».
- Si el hablante dicta una despedida, mantenla. Si no, no añadas
  ninguna.
- Mantén cada afirmación factual.
- Corrige la gramática y la puntuación; forma frases y párrafos
  completos.
- No inventes fórmulas hechas («Espero que…», «Adjunto…», «Quedo
  a la espera…») — conserva solo lo que se dictó.

Devuelve SOLO el cuerpo del correo, sin Markdown y sin comentarios.
"""
