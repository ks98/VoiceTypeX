#
# whisper-rs-sys 0.15 (pulled in transitively via whisper-rs 0.16) requires
# BLAS_INCLUDE_DIRS to be set explicitly when the `openblas` feature is
# active — previously whisper-rs-sys located the path itself.
#
# Standard path on Debian / Ubuntu (`apt install libopenblas-dev`):
# /usr/include/x86_64-linux-gnu/openblas-pthread
#
# `force = false` means: if the user sets the variable in their shell
# (e.g. for Fedora: /usr/include/openblas, or for a vendored
# installation), their choice wins. Windows builds must set the variable
# before `cargo build` — see docs/PLATFORMS.md.

[env]
BLAS_INCLUDE_DIRS = { value = "/usr/include/x86_64-linux-gnu/openblas-pthread", force = false }

# CMake build type for C++ dependencies (whisper-rs-sys, llama-cpp-sys
# in Phase 3b). Cargo's dev profile maps by default to CMAKE_BUILD_TYPE
# = Debug, which on whisper.cpp's Vulkan shader bridge files (>50 MB
# SPIR-V as an embedded C++ array) causes OOM in cc1plus — the
# compiler needs 3-4 GB per file with debug info. With Release the
# debug symbols are dropped and peak compile RAM settles at ~1-1.5 GB.
#
# `force = false` means: whoever sets `CMAKE_BUILD_TYPE=Debug
# cargo build` in their shell wins — debugging the C++ internals stays
# possible. Standard users with tight RAM get the fast, stable path.
CMAKE_BUILD_TYPE = { value = "Release", force = false }
