# SPDX-License-Identifier: GPL-3.0-or-later
#
# cargo-deny configuration. Gates the dependency tree on license
# compatibility and known advisories in CI (see
# .github/workflows/ci.yml, job Supply-Chain-Audit), so GPL-3.0
# compatibility is machine-enforced and no longer relies solely on the
# hand-maintained THIRD_PARTY_NOTICES.md.
#
# Run locally: cd src-tauri && cargo deny check

[licenses]
# Permissive licenses that are compatible with distributing the binary
# under GPL-3.0-or-later (the project license, see Cargo.toml). The list
# is derived from the actual dependency tree (`cargo deny list`); every
# entry below is present in src-tauri/Cargo.lock. When a dependency
# update introduces a new license, `cargo deny check licenses` fails and
# this list must be extended (or the dependency dropped).
allow = [
  # The project's own license (see Cargo.toml). cargo-deny evaluates the
  # root crate too, so this must be allowed even though it is not a
  # dependency.
  "GPL-3.0-or-later",
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "0BSD",
  "BSL-1.0",
  "Zlib",
  "Unicode-3.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "Unlicense",
  # Weak copyleft, file-scoped. GPL-3.0-compatible when the MPL'd files
  # are kept as separate units (which crate-level linking satisfies).
  "MPL-2.0",
]
# Crates without SPDX metadata or with a license below this confidence
# threshold are reported, not silently accepted.
confidence-threshold = 0.8

[advisories]
# Mirrors the cargo-audit --ignore list in ci.yml: known transitive
# unmaintained / unsound advisories from the Tauri/GTK3 stack that we
# cannot fix ourselves (no maintained upstream we can pull). Dependency
# chains: tauri -> tray-icon -> libappindicator -> gtk 0.18 (gtk3-rs,
# deprecated upstream), and tauri-utils -> urlpattern -> unic-*. Revisit
# the whole list when Tauri drops GTK3 / gtk-rs ships maintained GTK4
# bindings (and urlpattern moves off unic). Keep this list identical to
# the cargo-audit --ignore list in ci.yml — on every Tauri/GTK update
# check whether entries can be dropped.
ignore = [
  # glib 0.18 stack (pulled by the gtk3-rs crates below); review 2026-09:
  "RUSTSEC-2024-0370", # proc-macro-error 1.0.4 unmaintained (transitive via glib-macros 0.18 + gtk3-macros 0.18)
  # gtk3-rs stack (unmaintained, gtk-rs deprecated the GTK3 bindings;
  # pulled via gtk 0.18 -> libappindicator -> tray-icon -> tauri); review
  # 2026-09:
  "RUSTSEC-2024-0411", # gdkwayland-sys 0.18 unmaintained
  "RUSTSEC-2024-0412", # gdk 0.18 unmaintained
  "RUSTSEC-2024-0413", # atk 0.18 unmaintained
  "RUSTSEC-2024-0414", # gdkx11-sys 0.18 unmaintained
  "RUSTSEC-2024-0415", # gtk 0.18 unmaintained
  "RUSTSEC-2024-0416", # atk-sys 0.18 unmaintained
  "RUSTSEC-2024-0417", # gdkx11 0.18 unmaintained
  "RUSTSEC-2024-0418", # gdk-sys 0.18 unmaintained
  "RUSTSEC-2024-0419", # gtk3-macros 0.18 unmaintained
  "RUSTSEC-2024-0420", # gtk-sys 0.18 unmaintained
  "RUSTSEC-2024-0429", # glib 0.18 unsound (VariantStrIter, patched >=0.20; gtk3-rs pins glib 0.18); review 2026-09
  # unic-* stack (unmaintained, RUSTSEC issue #2414; transitive via
  # urlpattern 0.3 -> tauri-utils); review 2026-09:
  "RUSTSEC-2025-0075", # unic-char-range 0.9 unmaintained
  "RUSTSEC-2025-0080", # unic-common 0.9 unmaintained
  "RUSTSEC-2025-0081", # unic-char-property 0.9 unmaintained
  "RUSTSEC-2025-0098", # unic-ucd-version 0.9 unmaintained
  "RUSTSEC-2025-0100", # unic-ucd-ident 0.9 unmaintained
]

[bans]
# Minimal: warn on multiple versions of the same crate (large native
# stacks like Tauri/GTK legitimately pull several), do not fail the build
# on duplicates.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only crates.io is expected; any git or alternate-registry source is a
# supply-chain red flag and fails the build.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
